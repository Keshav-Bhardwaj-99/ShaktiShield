<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShaktiShield Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 font-sans">
    <!-- Login Overlay (shown if not authenticated) -->
    <div id="admin-login-overlay" class="fixed inset-0 bg-gray-900 bg-opacity-70 flex items-center justify-center z-50 hidden">
        <div class="bg-white w-full max-w-sm rounded-lg shadow-xl p-6">
            <h2 class="text-xl font-semibold mb-4 flex items-center"><i class="fas fa-user-shield mr-2 text-purple-600"></i>Admin Login</h2>
            <form id="admin-login-form" class="space-y-4">
                <div>
                    <label class="block text-gray-700 text-sm mb-1">Username</label>
                    <input id="admin-username" type="text" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-600" placeholder="admin" required>
                </div>
                <div>
                    <label class="block text-gray-700 text-sm mb-1">Password</label>
                    <input id="admin-password" type="password" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-600" placeholder="••••••••" required>
                </div>
                <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white py-2 rounded-md transition">Login</button>
                <p id="admin-login-error" class="text-red-600 text-sm mt-2 hidden">Invalid credentials. Please try again.</p>
            </form>
        </div>
    </div>
    <div class="flex h-screen bg-gray-200">
        <div class="flex flex-col w-64 bg-gray-800 text-white shadow-xl">
            <div class="p-6 text-xl font-bold flex items-center space-x-2">
                <i class="fas fa-shield-alt"></i>
                <a href="/" class="hover:text-purple-300 transition">SHAKTISHIELD</a>
            </div>
            <nav class="mt-8 flex-1">
                <a href="/admin" class="flex items-center px-6 py-2 mt-2 text-gray-100 hover:bg-gray-700 hover:text-white transition duration-200">
                    <i class="fas fa-tachometer-alt mr-3"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#reports-table" class="flex items-center px-6 py-2 mt-2 text-gray-400 hover:bg-gray-700 hover:text-white transition duration-200">
                    <i class="fas fa-file-alt mr-3"></i>
                    <span>Reports</span>
                </a>
            </nav>
            <div class="mt-auto p-6">
                <button id="logout-btn" class="w-full bg-red-600 text-white py-2 px-4 rounded-md hover:bg-red-700 transition">
                    <i class="fas fa-sign-out-alt mr-2"></i>
                    Logout
                </button>
            </div>
        </div>
        <div class="flex flex-col flex-1 overflow-y-auto">
            <header class="flex items-center justify-between p-6 bg-white shadow-md">
                <h1 class="text-2xl font-semibold text-gray-800">Admin Dashboard</h1>
                <div class="flex items-center space-x-4">
                    <div class="relative">
                        <span class="absolute top-0 right-0 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-red-100 transform translate-x-1/2 -translate-y-1/2 bg-red-600 rounded-full" id="new-reports-badge">0</span>
                        <i class="fas fa-bell text-gray-500 text-2xl"></i>
                    </div>
                </div>
            </header>
            <main class="flex-1 p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-lg shadow-md">
                        <div class="flex items-center">
                            <i class="fas fa-chart-line text-purple-600 text-3xl mr-4"></i>
                            <div>
                                <h3 class="text-sm text-gray-500 uppercase">Total Reports</h3>
                                <p class="text-2xl font-semibold text-gray-800" id="total-reports-count">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-lg shadow-md">
                        <div class="flex items-center">
                            <i class="fas fa-check-circle text-green-600 text-3xl mr-4"></i>
                            <div>
                                <h3 class="text-sm text-gray-500 uppercase">Resolved</h3>
                                <p class="text-2xl font-semibold text-gray-800" id="resolved-reports-count">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-lg shadow-md">
                        <div class="flex items-center">
                            <i class="fas fa-spinner text-yellow-600 text-3xl mr-4"></i>
                            <div>
                                <h3 class="text-sm text-gray-500 uppercase">In Progress</h3>
                                <p class="text-2xl font-semibold text-gray-800" id="in-progress-reports-count">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-lg shadow-md">
                        <div class="flex items-center">
                            <i class="fas fa-users text-blue-600 text-3xl mr-4"></i>
                            <div>
                                <h3 class="text-sm text-gray-500 uppercase">People Helped</h3>
                                <p class="text-2xl font-semibold text-gray-800" id="people-helped-count">0</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-lg shadow-md">
                        <h2 class="text-lg font-semibold mb-4">Reports by Status</h2>
                        <canvas id="statusChart"></canvas>
                    </div>
                    <div class="bg-white p-6 rounded-lg shadow-md">
                        <h2 class="text-lg font-semibold mb-4">Reports by Incident Type</h2>
                        <canvas id="typeChart"></canvas>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-lg shadow-md" id="reports-table">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-semibold">Recent Reports</h2>
                        <button id="refresh-button" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition">Refresh</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Report ID</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Incident Type</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Description</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Time</th>
                                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Location</th>
                                    <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="reports-table-body" class="bg-white divide-y divide-gray-200">
                                </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.js"></script>
    <script src="/js/admin.js"></script>
</body>
</html>
