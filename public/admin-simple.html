<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShaktiShield Admin Dashboard - Simple Access</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js for statistics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 font-sans">
    <!-- Navigation -->
    <nav class="bg-purple-800 text-white shadow-lg">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-shield-alt text-2xl"></i>
                <span class="text-xl font-bold">ShaktiShield Admin Dashboard</span>
            </div>
            <div class="flex items-center space-x-4">
                <span class="text-purple-200">Simple Access Mode</span>
                <a href="/" class="bg-purple-700 hover:bg-purple-600 px-4 py-2 rounded-lg transition">
                    <i class="fas fa-home mr-2"></i>Back to Main
                </a>
            </div>
        </div>
    </nav>

    <!-- Dashboard Content -->
    <div class="container mx-auto px-4 py-6">
        <!-- Statistics Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-500">
                <div class="flex items-center">
                    <div class="p-3 bg-blue-100 rounded-full">
                        <i class="fas fa-file-alt text-blue-600 text-xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-600">Total Reports</p>
                        <p id="totalReports" class="text-2xl font-bold text-gray-900">-</p>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-yellow-500">
                <div class="flex items-center">
                    <div class="p-3 bg-yellow-100 rounded-full">
                        <i class="fas fa-clock text-yellow-600 text-xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-600">Pending</p>
                        <p id="pendingReports" class="text-2xl font-bold text-gray-900">-</p>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-green-500">
                <div class="flex items-center">
                    <div class="p-3 bg-green-100 rounded-full">
                        <i class="fas fa-check-circle text-green-600 text-xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-600">Resolved</p>
                        <p id="resolvedReports" class="text-2xl font-bold text-gray-900">-</p>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-red-500">
                <div class="flex items-center">
                    <div class="p-3 bg-red-100 rounded-full">
                        <i class="fas fa-exclamation-triangle text-red-600 text-xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-600">High Priority</p>
                        <p id="highPriorityReports" class="text-2xl font-bold text-gray-900">-</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow-sm">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">Reports by Status</h3>
                <canvas id="statusChart" width="400" height="200"></canvas>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">Reports by Type</h3>
                <canvas id="typeChart" width="400" height="200"></canvas>
            </div>
        </div>

        <!-- Reports Table -->
        <div class="bg-white rounded-lg shadow-sm">
            <div class="p-6 border-b border-gray-200">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 sm:mb-0">Victim Reports</h3>
                    <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-4">
                        <select id="statusFilter" class="px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent">
                            <option value="">All Status</option>
                            <option value="pending">Pending</option>
                            <option value="investigating">Investigating</option>
                            <option value="resolved">Resolved</option>
                            <option value="closed">Closed</option>
                        </select>
                        <select id="priorityFilter" class="px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent">
                            <option value="">All Priority</option>
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                            <option value="urgent">Urgent</option>
                        </select>
                        <input type="text" id="cityFilter" placeholder="Filter by city" class="px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent">
                    </div>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Type</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Location</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Priority</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="reportsTableBody" class="bg-white divide-y divide-gray-200">
                        <!-- Reports will be populated here -->
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div class="px-6 py-3 border-t border-gray-200">
                <div class="flex items-center justify-between">
                    <div class="text-sm text-gray-700">
                        Showing <span id="showingStart">1</span> to <span id="showingEnd">10</span> of <span id="totalCount">0</span> results
                    </div>
                    <div class="flex space-x-2">
                        <button id="prevPage" class="px-3 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                            Previous
                        </button>
                        <span id="currentPage" class="px-3 py-2 text-sm text-gray-700">1</span>
                        <button id="nextPage" class="px-3 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                            Next
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Report Detail Modal -->
    <div id="reportModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg p-6 max-w-4xl w-full mx-4 max-h-screen overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Report Details</h2>
                <button id="closeReportModal" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div id="reportDetails" class="space-y-6">
                <!-- Report details will be populated here -->
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="fixed top-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg transform translate-x-full transition-transform duration-300 z-50">
        <div class="flex items-center space-x-2">
            <i class="fas fa-bell"></i>
            <span id="notificationMessage"></span>
        </div>
    </div>

    <!-- Custom JavaScript -->
    <script>
        class SimpleAdminDashboard {
            constructor() {
                this.currentPage = 1;
                this.pageSize = 20;
                this.filters = {
                    status: '',
                    priority: '',
                    city: ''
                };
                this.charts = {};
                this.reports = [];
                
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.loadDashboard();
            }

            setupEventListeners() {
                // Filters
                document.getElementById('statusFilter').addEventListener('change', (e) => {
                    this.filters.status = e.target.value;
                    this.currentPage = 1;
                    this.loadReports();
                });

                document.getElementById('priorityFilter').addEventListener('change', (e) => {
                    this.filters.priority = e.target.value;
                    this.currentPage = 1;
                    this.loadReports();
                });

                document.getElementById('cityFilter').addEventListener('input', (e) => {
                    this.filters.city = e.target.value;
                    this.currentPage = 1;
                    this.loadReports();
                });

                // Pagination
                document.getElementById('prevPage').addEventListener('click', () => {
                    if (this.currentPage > 1) {
                        this.currentPage--;
                        this.loadReports();
                    }
                });

                document.getElementById('nextPage').addEventListener('click', () => {
                    if (this.currentPage < Math.ceil(this.reports.length / this.pageSize)) {
                        this.currentPage++;
                        this.loadReports();
                    }
                });

                // Modal close
                document.getElementById('closeReportModal').addEventListener('click', () => {
                    this.hideReportModal();
                });
            }

            async loadDashboard() {
                try {
                    // Load statistics
                    const statsResponse = await fetch('/api/admin/stats');
                    if (statsResponse.ok) {
                        const stats = await statsResponse.json();
                        this.updateStatistics(stats);
                    }

                    // Load reports
                    const reportsResponse = await fetch('/api/reports');
                    if (reportsResponse.ok) {
                        this.reports = await reportsResponse.json();
                        this.loadReports();
                        this.updateCharts();
                    }
                } catch (error) {
                    console.error('Error loading dashboard:', error);
                    this.showNotification('Error loading dashboard data', 'error');
                }
            }

            updateStatistics(stats) {
                document.getElementById('totalReports').textContent = stats.totalReports || 0;
                document.getElementById('pendingReports').textContent = 
                    stats.reportsByStatus?.find(s => s.status === 'pending')?.count || 0;
                document.getElementById('resolvedReports').textContent = 
                    stats.reportsByStatus?.find(s => s.status === 'resolved')?.count || 0;
                document.getElementById('highPriorityReports').textContent = 
                    stats.reportsByPriority?.find(p => p.priority === 'high')?.count || 0;
            }

            loadReports() {
                let filteredReports = this.reports.filter(report => {
                    if (this.filters.status && report.status !== this.filters.status) return false;
                    if (this.filters.priority && report.priority !== this.filters.priority) return false;
                    if (this.filters.city && !report.city.toLowerCase().includes(this.filters.city.toLowerCase())) return false;
                    return true;
                });

                const startIndex = (this.currentPage - 1) * this.pageSize;
                const endIndex = startIndex + this.pageSize;
                const pageReports = filteredReports.slice(startIndex, endIndex);

                this.renderReportsTable(pageReports);
                this.updatePagination(filteredReports.length);
            }

            renderReportsTable(reports) {
                const tbody = document.getElementById('reportsTableBody');
                tbody.innerHTML = '';

                reports.forEach(report => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-gray-50';
                    
                    row.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${report.id.substring(0, 8)}...</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 capitalize">${report.incident_type}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${report.city}</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${this.getStatusColor(report.status)}">
                                ${report.status}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${this.getPriorityColor(report.priority)}">
                                ${report.priority}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${new Date(report.created_at).toLocaleDateString()}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                            <button onclick="adminDashboard.viewReport('${report.id}')" class="text-purple-600 hover:text-purple-900">
                                <i class="fas fa-eye mr-1"></i>View
                            </button>
                        </td>
                    `;
                    
                    tbody.appendChild(row);
                });
            }

            updatePagination(totalCount) {
                const totalPages = Math.ceil(totalCount / this.pageSize);
                const start = (this.currentPage - 1) * this.pageSize + 1;
                const end = Math.min(this.currentPage * this.pageSize, totalCount);

                document.getElementById('showingStart').textContent = start;
                document.getElementById('showingEnd').textContent = end;
                document.getElementById('totalCount').textContent = totalCount;
                document.getElementById('currentPage').textContent = this.currentPage;

                document.getElementById('prevPage').disabled = this.currentPage <= 1;
                document.getElementById('nextPage').disabled = this.currentPage >= totalPages;
            }

            updateCharts() {
                this.updateStatusChart();
                this.updateTypeChart();
            }

            updateStatusChart() {
                const ctx = document.getElementById('statusChart').getContext('2d');
                
                if (this.charts.statusChart) {
                    this.charts.statusChart.destroy();
                }

                const statusData = {};
                this.reports.forEach(report => {
                    statusData[report.status] = (statusData[report.status] || 0) + 1;
                });

                this.charts.statusChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(statusData),
                        datasets: [{
                            data: Object.values(statusData),
                            backgroundColor: ['#3B82F6', '#F59E0B', '#10B981', '#EF4444'],
                            borderWidth: 2,
                            borderColor: '#fff'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom'
                            }
                        }
                    }
                });
            }

            updateTypeChart() {
                const ctx = document.getElementById('typeChart').getContext('2d');
                
                if (this.charts.typeChart) {
                    this.charts.typeChart.destroy();
                }

                const typeData = {};
                this.reports.forEach(report => {
                    typeData[report.incident_type] = (typeData[report.incident_type] || 0) + 1;
                });

                this.charts.typeChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: Object.keys(typeData),
                        datasets: [{
                            label: 'Reports',
                            data: Object.values(typeData),
                            backgroundColor: '#8B5CF6',
                            borderColor: '#7C3AED',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    stepSize: 1
                                }
                            }
                        },
                        plugins: {
                            legend: {
                                display: false
                            }
                        }
                    }
                });
            }

            async viewReport(reportId) {
                try {
                    const response = await fetch(`/api/reports/${reportId}`);
                    if (response.ok) {
                        const report = await response.json();
                        this.showReportModal(report);
                    } else {
                        this.showNotification('Error loading report details', 'error');
                    }
                } catch (error) {
                    console.error('Error viewing report:', error);
                    this.showNotification('Error loading report details', 'error');
                }
            }

            showReportModal(report) {
                const modal = document.getElementById('reportModal');
                const details = document.getElementById('reportDetails');
                
                details.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <h3 class="text-lg font-semibold text-gray-800 mb-2">Incident Details</h3>
                            <div class="space-y-2">
                                <p><strong>Type:</strong> <span class="capitalize">${report.incident_type}</span></p>
                                <p><strong>Time:</strong> ${new Date(report.incident_time).toLocaleString()}</p>
                                <p><strong>Description:</strong> ${report.incident_description}</p>
                                <p><strong>City:</strong> ${report.city}</p>
                                <p><strong>Location:</strong> ${report.location_details || 'Not specified'}</p>
                            </div>
                        </div>
                        <div>
                            <h3 class="text-lg font-semibold text-gray-800 mb-2">Report Information</h3>
                            <div class="space-y-2">
                                <p><strong>Status:</strong> <span class="px-2 py-1 text-xs font-semibold rounded-full ${this.getStatusColor(report.status)}">${report.status}</span></p>
                                <p><strong>Priority:</strong> <span class="px-2 py-1 text-xs font-semibold rounded-full ${this.getPriorityColor(report.priority)}">${report.priority}</span></p>
                                <p><strong>Created:</strong> ${new Date(report.created_at).toLocaleString()}</p>
                                <p><strong>Updated:</strong> ${new Date(report.updated_at).toLocaleString()}</p>
                            </div>
                        </div>
                    </div>
                    <div class="mt-6">
                        <h3 class="text-lg font-semibold text-gray-800 mb-2">Support Required</h3>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            <div class="text-center p-3 bg-gray-50 rounded-lg">
                                <i class="fas fa-comments text-blue-600 text-xl mb-2"></i>
                                <p class="text-sm">Counseling: ${report.support_counseling ? 'Yes' : 'No'}</p>
                            </div>
                            <div class="text-center p-3 bg-gray-50 rounded-lg">
                                <i class="fas fa-gavel text-green-600 text-xl mb-2"></i>
                                <p class="text-sm">Legal: ${report.support_legal ? 'Yes' : 'No'}</p>
                            </div>
                            <div class="text-center p-3 bg-gray-50 rounded-lg">
                                <i class="fas fa-home text-purple-600 text-xl mb-2"></i>
                                <p class="text-sm">Shelter: ${report.support_shelter ? 'Yes' : 'No'}</p>
                            </div>
                            <div class="text-center p-3 bg-gray-50 rounded-lg">
                                <i class="fas fa-user text-orange-600 text-xl mb-2"></i>
                                <p class="text-sm">Contact: ${report.contact_method}</p>
                            </div>
                        </div>
                    </div>
                `;
                
                modal.classList.remove('hidden');
            }

            hideReportModal() {
                document.getElementById('reportModal').classList.add('hidden');
            }

            getStatusColor(status) {
                const colors = {
                    'pending': 'bg-yellow-100 text-yellow-800',
                    'investigating': 'bg-blue-100 text-blue-800',
                    'resolved': 'bg-green-100 text-green-800',
                    'closed': 'bg-gray-100 text-gray-800'
                };
                return colors[status] || 'bg-gray-100 text-gray-800';
            }

            getPriorityColor(priority) {
                const colors = {
                    'low': 'bg-green-100 text-green-800',
                    'medium': 'bg-yellow-100 text-yellow-800',
                    'high': 'bg-orange-100 text-orange-800',
                    'urgent': 'bg-red-100 text-red-800'
                };
                return colors[priority] || 'bg-gray-100 text-gray-800';
            }

            showNotification(message, type = 'success') {
                const notification = document.getElementById('notification');
                const messageEl = document.getElementById('notificationMessage');
                
                messageEl.textContent = message;
                notification.className = `fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg transform transition-transform duration-300 z-50 ${
                    type === 'error' ? 'bg-red-500' : 'bg-green-500'
                } text-white`;
                
                notification.classList.remove('translate-x-full');
                
                setTimeout(() => {
                    notification.classList.add('translate-x-full');
                }, 3000);
            }
        }

        // Initialize dashboard when page loads
        document.addEventListener('DOMContentLoaded', () => {
            window.adminDashboard = new SimpleAdminDashboard();
        });
    </script>
</body>
</html>
